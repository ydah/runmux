name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Zig 0.16.0 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Check formatting
        run: zig fmt --check build.zig build.zig.zon src

      - name: Fetch dependencies
        run: zig build --fetch

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      - name: Smoke test CLI
        run: |
          set -euo pipefail
          zig-out/bin/runmux --version
          zig-out/bin/runmux --help
          zig-out/bin/runmux check --config runmux.example.json
          zig-out/bin/runmux list --config runmux.example.json

      - name: Smoke test plain mode
        run: |
          set -euo pipefail
          log_dir="$(mktemp -d)"
          output="$(zig-out/bin/runmux run --plain --config testdata/plain.runmux.json --log-dir "$log_dir" 2>&1)"
          printf '%s\n' "$output"
          grep -F "[stdout-demo:stdout] out" <<<"$output"
          grep -F "[stderr-demo:stderr] err" <<<"$output"
          grep -F "[stdout-demo:stdout] out" "$log_dir/stdout-demo.log"
          grep -F "[stderr-demo:stderr] err" "$log_dir/stderr-demo.log"

      - name: Smoke test critical failure
        run: |
          set -euo pipefail
          set +e
          zig-out/bin/runmux run --plain --config testdata/critical.runmux.json --exit-on-critical-failure
          status=$?
          set -e
          test "$status" -eq 4

      - name: Smoke test dependency wait
        run: |
          set -euo pipefail
          output="$(zig-out/bin/runmux run --plain --config testdata/dependency.runmux.json 2>&1)"
          printf '%s\n' "$output"
          grep -F "[setup:stdout] ready" <<<"$output"
          grep -F "[app:system] waiting for dependencies" <<<"$output"
          grep -F "[app:stdout] app" <<<"$output"

      - name: Smoke test invalid config
        run: |
          set -euo pipefail
          set +e
          zig-out/bin/runmux check --config testdata/invalid_cmd_and_argv.runmux.json
          status=$?
          set -e
          test "$status" -eq 2
