name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            exe: runmux
          - target: aarch64-linux
            exe: runmux
          - target: x86_64-macos
            exe: runmux
          - target: aarch64-macos
            exe: runmux
          - target: x86_64-windows
            exe: runmux.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build release binary
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

      - name: Package
        run: |
          set -euo pipefail
          archive="runmux-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "dist/$archive"
          cp "zig-out/bin/${{ matrix.exe }}" "dist/$archive/"
          cp README.md "dist/$archive/"
          tar -C dist -czf "dist/$archive.tar.gz" "$archive"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: runmux-${{ matrix.target }}
          path: dist/*.tar.gz
          archive: false
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    defaults:
      run:
        shell: bash
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 *.tar.gz > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/SHA256SUMS --generate-notes
